<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape from Polyphemus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Odyssey: Escape Polyphemus</h1>
        <p>Sneak Odysseus's men past the blinded Cyclops by jumping between the sheep!</p>
    </header>

    <main class="game-container">
        <div class="scoreboard">
            <div class="stat">Men Escaped: <span id="saved-count">0</span> / 10</div>
            <div class="stat">Timer: <span id="timer">0.0</span>s</div>
        </div>

        <div class="cave" id="cave">
            <div class="cyclops" id="cyclops">
                <svg viewBox="0 0 100 100" width="100" height="100">
                    <circle cx="50" cy="50" r="45" fill="#5c4d42" stroke="#3e332a" stroke-width="4"/>
                    <circle cx="50" cy="40" r="12" fill="#fff" />
                    <line x1="40" y1="30" x2="60" y2="50" stroke="#8b0000" stroke-width="4" />
                    <line x1="60" y1="30" x2="40" y2="50" stroke="#8b0000" stroke-width="4" />
                    <path d="M 35 70 Q 50 55 65 70" stroke="#221a14" stroke-width="4" fill="none" />
                </svg>
                <div class="cyclops-label">Polyphemus</div>
            </div>

            <div class="sheep-lane">
                <button class="sheep-btn" id="sheep-left" onclick="jumpToSheep('left')">
                    <svg viewBox="0 0 100 100" width="90" height="90">
                        <ellipse cx="50" cy="45" rx="30" ry="20" fill="#f0e6d2" />
                        <circle cx="72" cy="35" r="12" fill="#e0d6c2" />
                        <circle cx="74" cy="32" r="1.5" fill="#000" />
                        <rect x="38" y="60" width="5" height="10" fill="#333" />
                        <rect x="58" y="60" width="5" height="10" fill="#333" />
                        
                        <circle cx="50" cy="68" r="5" fill="#ffcc99" />
                        <line x1="50" y1="73" x2="50" y2="88" stroke="#ffffff" stroke-width="3" />
                        <line x1="50" y1="76" x2="38" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="76" x2="62" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="42" y2="98" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="58" y2="98" stroke="#ffffff" stroke-width="2" />
                    </svg>
                    <span>Left Sheep</span>
                </button>

                <button class="sheep-btn" id="sheep-right" onclick="jumpToSheep('right')">
                    <svg viewBox="0 0 100 100" width="90" height="90">
                        <ellipse cx="50" cy="45" rx="30" ry="20" fill="#f0e6d2" />
                        <circle cx="72" cy="35" r="12" fill="#e0d6c2" />
                        <circle cx="74" cy="32" r="1.5" fill="#000" />
                        <rect x="38" y="60" width="5" height="10" fill="#333" />
                        <rect x="58" y="60" width="5" height="10" fill="#333" />
                        
                        <circle cx="50" cy="68" r="5" fill="#ffcc99" />
                        <line x1="50" y1="73" x2="50" y2="88" stroke="#ffffff" stroke-width="3" />
                        <line x1="50" y1="76" x2="38" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="76" x2="62" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="42" y2="98" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="58" y2="98" stroke="#ffffff" stroke-width="2" />
                    </svg>
                    <span>Right Sheep</span>
                </button>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" onclick="startGame()">Begin Escape</button>
        </div>
    </main>

    <script>
        let savedMen = 0;
        let timeElapsed = 0;
        let gameInterval = null;
        let timerInterval = null;
        let currentCyclopsPosition = 'left'; 
        let gameActive = false;

        function startGame() {
            savedMen = 0;
            timeElapsed = 0;
            gameActive = true;
            
            document.getElementById('saved-count').textContent = savedMen;
            document.getElementById('timer').textContent = "0.0";
            document.getElementById('start-btn').textContent = "Reset Game";

            clearInterval(gameInterval);
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeElapsed += 0.1;
                document.getElementById('timer').textContent = timeElapsed.toFixed(1);
            }, 100);

            moveCyclops();
            gameInterval = setInterval(moveCyclops, 1300); 
        }

        function moveCyclops() {
            if (!gameActive) return;
            
            const cyclopsElement = document.getElementById('cyclops');
            currentCyclopsPosition = Math.random() < 0.5 ? 'left' : 'right';
            
            if (currentCyclopsPosition === 'left') {
                cyclopsElement.style.left = '25%';
            } else {
                cyclopsElement.style.left = '75%';
            }
        }

        function jumpToSheep(chosenSide) {
            if (!gameActive) {
                startGame();
                return;
            }

            if (chosenSide === currentCyclopsPosition) {
                alert("Polyphemus reached down and felt your presence! The warrior scrambled back. (+3s Penalty!)");
                timeElapsed += 3.0;
            } else {
                savedMen++;
                document.getElementById('saved-count').textContent = savedMen;

                if (savedMen >= 10) {
                    gameActive = false;
                    clearInterval(gameInterval);
                    clearInterval(timerInterval);
                    alert(`Victory! You safely guided all 10 men out of the cave in ${timeElapsed.toFixed(1)} seconds!`);
                    document.getElementById('start-btn').textContent = "Play Again";
                }
            }
        }
    </script>
</body>
</html>
