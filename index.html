<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape from Polyphemus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1e130c, #9a7b56);
            color: #f5ebe0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        header h1 {
            font-size: 2.3rem;
            color: #e0a96d;
            margin-bottom: 5px;
        }

        .game-container {
            background: rgba(26, 17, 11, 0.9);
            border: 3px solid #e0a96d;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            background: #2c1a11;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #e0a96d;
        }

        /* Cave Backdrop looking out toward the horizon */
        .cave {
            position: relative;
            height: 320px;
            background: 
                radial-gradient(circle at 50% 25%, transparent 35%, #120a06 65%),
                linear-gradient(to bottom, #a2d2ff 0%, #e0a96d 40%, #1d3557 70%, #0f1c2e 100%);
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #4a3525;
            box-shadow: inset 0 0 40px #000;
        }

        .cyclops {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            transition: left 0.2s ease-in-out;
            z-index: 5;
        }

        .cyclops-label {
            font-size: 0.85rem;
            color: #ff4d4d;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .sheep-lane {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .sheep-btn {
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-weight: bold;
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.3s ease; 
        }

        .sheep-btn:hover:not(:disabled) {
            transform: scale(1.12);
            filter: drop-shadow(0 0 12px #e0a96d);
        }

        /* Strict Cooldown Visual Effect */
        .sheep-btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            transform: scale(0.85);
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        #start-btn {
            background-color: #e0a96d;
            color: #1e130c;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s ease;
        }

        #start-btn:hover {
            background-color: #f5ebe0;
        }

        /* Leaderboard Styling */
        .leaderboard-box {
            background: #1c120c;
            border: 1px solid #e0a96d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .leaderboard-box h3 {
            margin-top: 0;
            text-align: center;
            color: #e0a96d;
            border-bottom: 1px solid #4a3525;
            padding-bottom: 8px;
        }

        .score-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px dashed #3a2617;
            font-size: 0.95rem;
        }

        .score-item:last-child {
            border-bottom: none;
        }

        .highlight-score {
            color: #64dfdf;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Odyssey: Escape Polyphemus</h1>
        <p>Smuggle 15 warriors to the ships. Tap the safe sheep, but watch out for the cooldowns!</p>
    </header>

    <main class="game-container">
        <div class="scoreboard">
            <div class="stat">Men Escaped: <span id="saved-count">0</span> / 15</div>
            <div class="stat">Timer: <span id="timer">0.0</span>s</div>
        </div>

        <div class="cave" id="cave">
            <div class="cyclops" id="cyclops">
                <svg viewBox="0 0 100 100" width="90" height="90">
                    <circle cx="50" cy="50" r="45" fill="#5c4d42" stroke="#3e332a" stroke-width="4"/>
                    <circle cx="50" cy="40" r="12" fill="#fff" />
                    <line x1="40" y1="30" x2="60" y2="50" stroke="#8b0000" stroke-width="4" />
                    <line x1="60" y1="30" x2="40" y2="50" stroke="#8b0000" stroke-width="4" />
                    <path d="M 35 70 Q 50 55 65 70" stroke="#221a14" stroke-width="4" fill="none" />
                </svg>
                <div class="cyclops-label">Polyphemus</div>
            </div>

            <div class="sheep-lane">
                <button class="sheep-btn" id="sheep-left" onclick="jumpToSheep('left')">
                    <svg viewBox="0 0 100 100" width="85" height="85">
                        <ellipse cx="50" cy="45" rx="30" ry="20" fill="#f0e6d2" />
                        <circle cx="72" cy="35" r="12" fill="#e0d6c2" />
                        <circle cx="74" cy="32" r="1.5" fill="#000" />
                        <rect x="38" y="60" width="5" height="10" fill="#333" />
                        <rect x="58" y="60" width="5" height="10" fill="#333" />
                        <circle cx="50" cy="68" r="5" fill="#ffcc99" />
                        <line x1="50" y1="73" x2="50" y2="88" stroke="#ffffff" stroke-width="3" />
                        <line x1="50" y1="76" x2="38" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="76" x2="62" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="42" y2="98" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="58" y2="98" stroke="#ffffff" stroke-width="2" />
                    </svg>
                    <span>Left Sheep</span>
                </button>

                <button class="sheep-btn" id="sheep-right" onclick="jumpToSheep('right')">
                    <svg viewBox="0 0 100 100" width="85" height="85">
                        <ellipse cx="50" cy="45" rx="30" ry="20" fill="#f0e6d2" />
                        <circle cx="72" cy="35" r="12" fill="#e0d6c2" />
                        <circle cx="74" cy="32" r="1.5" fill="#000" />
                        <rect x="38" y="60" width="5" height="10" fill="#333" />
                        <rect x="58" y="60" width="5" height="10" fill="#333" />
                        <circle cx="50" cy="68" r="5" fill="#ffcc99" />
                        <line x1="50" y1="73" x2="50" y2="88" stroke="#ffffff" stroke-width="3" />
                        <line x1="50" y1="76" x2="38" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="76" x2="62" y2="62" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="42" y2="98" stroke="#ffffff" stroke-width="2" />
                        <line x1="50" y1="88" x2="58" y2="98" stroke="#ffffff" stroke-width="2" />
                    </svg>
                    <span>Right Sheep</span>
                </button>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" onclick="startGame()">Begin Escape</button>
        </div>

        <div class="leaderboard-box">
            <h3>Leaderboard (Top Records)</h3>
            <ul class="score-list" id="leaderboard-list">
                </ul>
        </div>
    </main>

    <script>
        let savedMen = 0;
        let timeElapsed = 0;
        let gameInterval = null;
        let timerInterval = null;
        let currentCyclopsPosition = 'left'; 
        let gameActive = false;

        // Pre-seeded high scores array
        let highScores = [
            { name: "Donovan", time: 8.4 },
            { name: "Vicente", time: 9.6 },
            { name: "Brianna", time: 10.8 },
            { name: "Otto", time: 12.5 },
            { name: "Jimmy", time: 132.0 }
        ];

        // Initialize display on load
        window.onload = function() {
            renderLeaderboard();
        };

        function renderLeaderboard() {
            const listElement = document.getElementById('leaderboard-list');
            listElement.innerHTML = '';
            
            // Sort ascending by time
            highScores.sort((a, b) => a.time - b.time);

            highScores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = 'score-item';
                
                let timeString = entry.time >= 60 ? "1 minute" : `${entry.time.toFixed(1)} seconds`;
                li.innerHTML = `<span>${index + 1}. ${entry.name}</span> <span>${timeString}</span>`;
                listElement.appendChild(li);
            });
        }

        function startGame() {
            savedMen = 0;
            timeElapsed = 0;
            gameActive = true;
            
            document.getElementById('saved-count').textContent = savedMen;
            document.getElementById('timer').textContent = "0.0";
            document.getElementById('start-btn').textContent = "Reset Game";

            document.getElementById('sheep-left').disabled = false;
            document.getElementById('sheep-right').disabled = false;

            clearInterval(gameInterval);
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeElapsed += 0.1;
                document.getElementById('timer').textContent = timeElapsed.toFixed(1);
            }, 100);

            moveCyclops();
            gameInterval = setInterval(moveCyclops, 1100); 
        }

        function moveCyclops() {
            if (!gameActive) return;
            
            const cyclopsElement = document.getElementById('cyclops');
            currentCyclopsPosition = Math.random() < 0.5 ? 'left' : 'right';
            
            if (currentCyclopsPosition === 'left') {
                cyclopsElement.style.left = '25%';
            } else {
                cyclopsElement.style.left = '75%';
            }
        }

        function jumpToSheep(chosenSide) {
            if (!gameActive) {
                startGame();
                return;
            }

            const targetBtn = chosenSide === 'left' ? document.getElementById('sheep-left') : document.getElementById('sheep-right');

            if (chosenSide === currentCyclopsPosition) {
                alert("Polyphemus reached down and felt your presence! The warrior scrambled back. (+3s Penalty!)");
                timeElapsed += 3.0;
            } else {
                savedMen++;
                document.getElementById('saved-count').textContent = savedMen;

                if (savedMen >= 15) {
                    gameActive = false;
                    clearInterval(gameInterval);
                    clearInterval(timerInterval);
                    
                    const finalTime = parseFloat(timeElapsed.toFixed(1));
                    
                    // Prompt the player to enter their name right away
                    setTimeout(() => {
                        let playerName = prompt(`Victory! You safely guided all 15 men out of the cave in ${finalTime} seconds!\nEnter your name for the scoreboard:`);
                        if (!playerName) playerName = "Anonymous Hero";
                        
                        // Push new score and re-render
                        highScores.push({ name: playerName, time: finalTime });
                        renderLeaderboard();
                        
                        document.getElementById('start-btn').textContent = "Play Again";
                    }, 100);
                } else {
                    // Force a hard 2-second cooldown on the clicked sheep button
                    targetBtn.disabled = true;
                    setTimeout(() => {
                        targetBtn.disabled = false;
                    }, 2000);
                }
            }
        }
    </script>
</body>
</html>
